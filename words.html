        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .word-chip {
            transition: all 0.2s ease;

            </div>
        </div>

            </div>

                <!-- Length 6 -->

                    </div>

        // Process dictionary string into array
        // Cleaning up the raw string: split by whitespace, trim, lowercase, remove empty
        const commonWords = dictionaryRaw.split(/\s+/)
            .map(w => w.trim().toLowerCase())
            .filter(w => w.length >= 3 && w.length <= 6 && /^[a-z]+$/.test(w));

        // Use a Set to remove any potential duplicates
        const wordSet = new Set(commonWords);
        const dictionary = Array.from(wordSet);

        const letterInput = document.getElementById('letterInput');
        const letterCount = document.getElementById('letterCount');
        const resultsArea = document.getElementById('resultsArea');

        // Event Listeners
        letterInput.addEventListener('input', (e) => {
            // Filter non-alpha
            e.target.value = e.target.value.replace(/[^a-zA-Z]/g, '');
            updateCount();
        });

        letterInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') findWords();
        });

        function updateCount() {
            const len = letterInput.value.length;
            letterCount.textContent = `${len} letter${len !== 1 ? 's' : ''} entered`;
        }

        function clearInput() {
            letterInput.value = '';
            letterInput.focus();
            updateCount();
            resultsArea.classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
        }

        function getFrequency(str) {
            const freq = {};
            for (let char of str) {
                freq[char] = (freq[char] || 0) + 1;
            }
            return freq;
        }

        function findWords() {
            const inputVal = letterInput.value.toLowerCase();
            if (inputVal.length < 3) {
                alert("Please enter at least 3 letters.");
                return;
            }

            const inputFreq = getFrequency(inputVal);
            
            // Logic: A word is valid if for every char in word, 
            // wordFreq[char] <= inputFreq[char]
            
            let matches = dictionary.filter(word => {
                const wordFreq = getFrequency(word);
                for (let char in wordFreq) {
                    if (!inputFreq[char] || wordFreq[char] > inputFreq[char]) {
                        return false;
                    }
                }
                return true;
            });

            // Filter if > 50 results: Require at least one of the last 2 letters entered to be present in the word
            if (matches.length > 50 && inputVal.length >= 2) {
                const lastTwo = inputVal.slice(-2);
                const char1 = lastTwo[0];
                const char2 = lastTwo[1];
                
                matches = matches.filter(word => {
                    // Check if the word contains at least one of the last 2 letters
                    return word.includes(char1) || word.includes(char2);
                });
            }

            displayResults(matches);
        }

        function displayResults(words) {
            const container = document.getElementById('resultsArea');
            const emptyState = document.getElementById('emptyState');
            
            // Clear previous results
            [3, 4, 5, 6].forEach(n => {
                document.querySelector(`.content-${n}`).innerHTML = '';
                document.getElementById(`group-${n}`).classList.add('hidden');
            });

            if (words.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');

            document.getElementById('totalFound').textContent = words.length;

            // Group by length
            const grouped = { 3: [], 4: [], 5: [], 6: [] };
            words.forEach(w => {
                if(grouped[w.length]) grouped[w.length].push(w);
            });

            // Render
            [6, 5, 4, 3].forEach(len => {
                const groupDiv = document.getElementById(`group-${len}`);
                const contentDiv = document.querySelector(`.content-${len}`);
                const list = grouped[len].sort(); // Alphabetical sort

                if (list.length > 0) {
                    groupDiv.classList.remove('hidden');
                    list.forEach(word => {
                        const chip = document.createElement('div');
                        chip.className = `word-chip bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg shadow-sm font-medium text-sm select-all cursor-text`;
                        chip.textContent = word;
                        contentDiv.appendChild(chip);
                    });
                }
            });
        }
